name: Build Windows Release

on:
  push:
    branches: ["main", "master"]
    paths:
      - "VERSION"
      - ".github/workflows/build.yml"
      - "ghost_hunter.py"
      - "ghosthunter_app/**"
      - "installer.nsi"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Validate source before packaging
        shell: bash
        run: |
          python -m py_compile ghosthunter_app/*.py
          python - <<'PY'
          from pathlib import Path
          html = Path('ghosthunter_app/ui/ghost_hunter_ui.html').read_text(encoding='utf-8')
          start = html.index('<script>') + len('<script>')
          end = html.rindex('</script>')
          Path('ghp_ui_check.js').write_text(html[start:end], encoding='utf-8')
          PY
          node --check ghp_ui_check.js

      - name: Check critical app files are present
        shell: bash
        run: |
          test -f ghosthunter_app/save_scanner.py
          test -f ghosthunter_app/ui/ghost_hunter_ui.html
          test -f ghosthunter_app/ui/fonts/dm-mono-regular.ttf
          test -f ghosthunter_app/ui/fonts/dm-mono-medium.ttf
          test -f ghosthunter_app/ui/fonts/jetbrains-mono-regular.ttf
          test -f ghosthunter_app/ui/fonts/jetbrains-mono-bold.ttf
          test -f ghosthunter_app/ui/fonts/roboto-condensed-regular.ttf
          test -f ghosthunter_app/ui/fonts/roboto-condensed-bold.ttf
          test -f ghosthunter_app/ui/fonts/unifrakturmaguntia-regular.ttf
          echo "Critical files included in checkout:"
          find ghosthunter_app -maxdepth 3 -type f | sort

      - name: Build Windows EXE
        shell: bash
        run: |
          ICON_ARG=""
          if [[ -f ghosthunter.ico ]]; then
            ICON_ARG="--icon ghosthunter.ico"
          fi
          python -m PyInstaller \
            --noconfirm --onefile --windowed \
            --name "GhostHunterPro" \
            --collect-all webview \
            --collect-submodules ghosthunter_app \
            --collect-data ghosthunter_app \
            --hidden-import ghosthunter_app.save_scanner \
            --add-data "ghosthunter_app;ghosthunter_app" \
            $ICON_ARG \
            ghost_hunter.py

      - name: Build NSIS installer
        shell: bash
        run: |
          choco install nsis --no-progress -y
          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' /DAPP_VERSION=${{ env.VERSION }} installer.nsi"

      - name: Build Windows portable zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-windows | Out-Null
          Copy-Item dist\GhostHunterPro.exe release-windows\GhostHunterPro.exe -Force
          Copy-Item README.md release-windows\README.md -Force
          Compress-Archive -Path release-windows\* -DestinationPath "GhostHunterPro-Portable-${{ env.VERSION }}.zip" -Force

      - name: Upload Windows portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe-${{ env.VERSION }}
          path: dist/GhostHunterPro.exe

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip-${{ env.VERSION }}
          path: GhostHunterPro-Portable-${{ env.VERSION }}.zip

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: GhostHunterPro-Setup-*.exe

  release:
    name: Create Draft Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Ghost Hunter Pro v${{ env.VERSION }}
          draft: true
          overwrite_files: true
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          files: release-assets/**/*
