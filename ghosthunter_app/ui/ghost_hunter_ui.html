<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghost Hunter Pro</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(18, 25, 42, 0.82);
      --panel-2: rgba(23, 33, 54, 0.9);
      --border: rgba(255,255,255,0.08);
      --text: #ecf2fb;
      --muted: #8a96ad;
      --cyan: #1ac7ff;
      --cyan-2: #0bb2e3;
      --purple: #a24cff;
      --green: #22c76e;
      --red: #ff5b57;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(84,25,166,0.12), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(24,163,211,0.08), transparent 75%),
        linear-gradient(180deg, #08101b 0%, #070b14 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(32, 54, 88, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 54, 88, 0.18) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,.85), rgba(255,255,255,.35));
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(106, 131, 170, .7) rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,.04);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(108,128,161,.92), rgba(80,98,128,.92));
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(132,153,190,.96), rgba(95,113,146,.96));
    }

    .app {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 18px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-size: 24px;
      line-height: 1;
      text-shadow: 0 0 12px rgba(26,199,255,.55);
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 18px;
      background: linear-gradient(90deg, var(--cyan), #6aa7ff 55%, #b883ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .brand-sub .desktop {
      color: var(--cyan);
      font-weight: 600;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 28px rgba(26,199,255,.08);
      backdrop-filter: blur(12px);
    }

    .tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 15px;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: .2s ease;
    }

    .tab.active {
      background: rgba(255,255,255,.10);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 0 20px rgba(118,97,255,.12);
    }

    .tab.home-nav {
      min-width: 132px;
      background: linear-gradient(90deg, rgba(17,183,223,.14), rgba(162,76,255,.12));
      border: 1px solid rgba(126,217,255,.16);
      color: #eef8ff;
      box-shadow: 0 0 18px rgba(26,199,255,.08), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .tab.home-nav:hover {
      background: linear-gradient(90deg, rgba(17,183,223,.2), rgba(162,76,255,.18));
      transform: translateY(-1px);
    }

    .tab.home-nav.active {
      background: linear-gradient(90deg, rgba(17,183,223,.24), rgba(162,76,255,.2));
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 24px rgba(26,199,255,.14);
    }

    .tab.settings-nav {
      min-width: 140px;
      background: linear-gradient(90deg, rgba(17,183,223,.12), rgba(162,76,255,.10));
      border: 1px solid rgba(126,217,255,.14);
      color: #eef8ff;
      box-shadow: 0 0 18px rgba(26,199,255,.08), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .tab.settings-nav:hover {
      background: linear-gradient(90deg, rgba(17,183,223,.18), rgba(162,76,255,.16));
      transform: translateY(-1px);
    }

    .tab.settings-nav.active {
      background: linear-gradient(90deg, rgba(17,183,223,.22), rgba(162,76,255,.22));
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 24px rgba(26,199,255,.14);
    }

    .tab-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      margin-right: 8px;
      vertical-align: -5px;
      color: #7fd9ff;
      background: rgba(127,217,255,.10);
      border: 1px solid rgba(127,217,255,.18);
      border-radius: 8px;
      filter: drop-shadow(0 0 6px rgba(26,199,255,.18));
    }

    .tab.active .tab-icon {
      color: white;
    }

    .tab-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .view-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view {
      display: none;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 6px 28px 36px;
    }

    .view.active { display: block; }

    .hero {
      max-width: 860px;
      margin: 92px auto 40px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(52px, 7vw, 72px);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    .hero h1 span.grad {
      background: linear-gradient(90deg, var(--cyan), #4b8bff 55%, #9f65ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .search-wrap {
      position: relative;
      max-width: 880px;
      margin: 38px auto 0;
    }

    .hero-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .btn.hero-link {
      border: 1px solid rgba(26,199,255,.18);
      background: linear-gradient(90deg, rgba(17,183,223,.18), rgba(162,76,255,.16));
      color: #eef8ff;
      box-shadow: 0 0 22px rgba(26,199,255,.12), 0 10px 24px rgba(0,0,0,.18);
      font-size: 15px;
      padding: 13px 22px;
      font-weight: 800;
    }

    .btn.hero-link:hover {
      background: linear-gradient(90deg, rgba(17,183,223,.24), rgba(162,76,255,.22));
      box-shadow: 0 0 28px rgba(26,199,255,.16), 0 12px 28px rgba(0,0,0,.2);
    }

    .search-shell {
      max-width: 880px;
      margin: 0 auto;
      padding: 2px;
      border-radius: 24px;
      background: linear-gradient(90deg, rgba(17,198,255,.35), rgba(164,76,255,.42));
      box-shadow: 0 0 40px rgba(36,171,255,.18), 0 0 50px rgba(162,76,255,.12);
    }

    .search-inner {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 8px 8px 8px 18px;
      border-radius: 22px;
      background: rgba(5, 11, 21, .96);
    }

    .search-icon {
      color: var(--muted);
      font-size: 18px;
      flex: 0 0 auto;
    }

    .search-input {
      flex: 1 1 auto;
      min-width: 0;
      border: 0;
      outline: none;
      color: var(--text);
      background: transparent;
      font-size: 17px;
      padding: 12px 0;
    }

    .search-input::placeholder { color: #67748d; }

    .suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 10px);
      z-index: 10;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(16, 22, 38, .96);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .suggestion {
      width: 100%;
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      border-top: 1px solid rgba(255,255,255,.05);
    }

    .suggestion:first-child { border-top: 0; }
    .suggestion:hover { background: rgba(255,255,255,.05); }

    .suggestion img,
    .suggestion .fallback {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: cover;
      flex: 0 0 auto;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.05);
    }

    .suggestion .fallback {
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.35);
      font-size: 22px;
    }

    .suggestion-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }

    .suggestion-sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
      padding: 12px 18px;
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
    }

    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn.primary {
      border: 0;
      color: white;
      background: linear-gradient(90deg, var(--cyan-2), var(--purple));
      box-shadow: 0 10px 28px rgba(112,78,255,.25);
    }

    .btn.pill { border-radius: 14px; }

    .btn.filter.active {
      background: rgba(162,76,255,.18);
      border-color: rgba(162,76,255,.32);
      color: #f1dbff;
      box-shadow: 0 0 0 1px rgba(162,76,255,.16) inset;
    }

    .btn.good {
      background: rgba(35, 199, 110, .16);
      border-color: rgba(35,199,110,.22);
      color: #dff8eb;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .home-mini {
      margin: 28px auto 0;
      text-align: center;
      color: #73809a;
      font-size: 14px;
    }

    .history-card {
      max-width: 980px;
      margin: 28px auto 0;
      padding: 18px 18px 20px;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .history-title {
      font-size: 16px;
      font-weight: 700;
      color: #dfe9f7;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .history-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      padding: 8px 10px;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .history-open {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
    }

    .history-icon {
      width: 16px;
      height: 16px;
      display: inline-grid;
      place-items: center;
      color: var(--cyan);
    }

    .history-remove {
      appearance: none;
      border: 0;
      background: rgba(255,91,87,.12);
      color: #ffb1af;
      border-radius: 8px;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: .0;
      transition: .16s ease;
    }

    .history-pill:hover .history-remove,
    .history-remove:focus-visible {
      opacity: 1;
    }

    .history-clear {
      appearance: none;
      border: 0;
      background: transparent;
      color: #8c97ab;
      font-size: 14px;
      cursor: pointer;
    }

    .history-clear:hover {
      color: #c7d3e6;
    }

    .home-tools {
      max-width: 980px;
      margin: 18px auto 0;
      display: flex;
      justify-content: flex-start;
    }

    .home-results {
      max-width: 980px;
      margin: 18px auto 0;
      padding: 16px;
      display: none;
    }

    .home-results.visible { display: block; }

    .result-head {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
      padding: 8px 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .result-head img {
      width: 320px;
      height: 150px;
      border-radius: 16px;
      object-fit: cover;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.05);
    }

    .result-info {
      flex: 1 1 360px;
      min-width: 280px;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      margin: 0;
    }

    .tags {
      margin: 14px 0 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: #d7e7ff;
    }

    .tag.cyan { background: rgba(17,183,223,.14); color: #bcedff; }
    .tag.purple { background: rgba(142,115,255,.14); color: #e0d9ff; }
    .tag.orange { background: rgba(255,157,77,.14); color: #ffe2c8; }
    .tag.red { background: rgba(255,91,87,.18); color: #ffe0df; }
    .tag.legit { background: rgba(26,199,255,.16); color: #dff8ff; border-color: rgba(26,199,255,.22); }

    .summary-line {
      color: var(--muted);
      font-size: 14px;
    }

    .section-title {
      margin: 22px 8px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #7486a3;
      font-weight: 800;
    }

    .path-section {
      margin: 0 0 14px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }

    .path-section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
    }

    .path-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,.05);
    }

    .path-row:first-child { border-top: 0; }
    .path-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .path-actions {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }
    .path-code {
      display: block;
      margin-top: 6px;
      color: #b7eaff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .check {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: var(--cyan-2);
      cursor: pointer;
    }

    .tiny-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .tiny-btn:hover { background: rgba(255,255,255,.09); }

    .tiny-btn.danger {
      color: #ffe3e2;
      background: rgba(255,91,87,.15);
      border-color: rgba(255,91,87,.24);
    }

    .empty, .loading-state {
      max-width: 880px;
      margin: 120px auto 0;
      padding: 42px 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty .big,
    .loading-state .big {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 18px;
      border: 3px solid rgba(255,255,255,.10);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .library-shell {
      max-width: 1100px;
      margin: 18px auto 0;
    }

    .library-header {
      text-align: center;
      margin: 18px 0 28px;
    }

    .library-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      font-size: 15px;
      font-weight: 800;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .library-sub {
      margin-top: 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .settings-shell {
      max-width: 980px;
      margin: 24px auto 0;
      display: grid;
      gap: 18px;
    }

    .settings-card {
      padding: 18px;
    }

    .settings-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .settings-sub {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .settings-tabs {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      margin: 8px 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .settings-tab {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: .16s ease;
    }

    .settings-tab.active {
      color: var(--text);
      background: linear-gradient(90deg, rgba(17,183,223,.16), rgba(162,76,255,.14));
      border-color: rgba(126,217,255,.12);
      box-shadow: 0 0 18px rgba(26,199,255,.08);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .settings-item {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
    }

    .settings-label {
      color: #93a0b7;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .settings-value {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .settings-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .settings-note {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .toolbar {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .search-inline {
      flex: 1 1 520px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 48px;
      border-radius: 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
    }

    .search-inline input {
      flex: 1 1 auto;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);

    .toolbar-actions {

    .toolbar-actions .btn.bulk {
      background: rgba(17,183,223,.12);

    .game-card {
      position: relative;

    .card-media,

    .card-fallback {

    .status-badge {

    .archive-badge {

    .badge-icon {

    .badge-icon svg,

    .archive-fab {

    .game-card:hover .archive-fab,

    .archive-fab.archive {

    .archive-fab.restore {

    .select-fab {

      color: #dff8ff;

      transform: translateY(-4px) scale(.96);

    .game-card:hover .select-fab,
    .game-card.selected .select-fab,

    .select-fab svg {

    .select-fab.active {

    .card-body { padding: 14px 14px 16px; }

    .game-title {

    .mini-badge.legit {

    .modal-overlay {
      position: fixed;

      backdrop-filter: blur(12px);

    }

    .modal-overlay.show { display: flex; }

    .confirm-card {
      width: min(460px, 100%);
      background: rgba(11, 16, 28, .97);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      box-shadow: 0 32px 90px rgba(0,0,0,.46);

      animation: tvOpen .22s ease-out;

    .confirm-title {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 10px;
    }

    .confirm-text {
      color: var(--muted);

      line-height: 1.65;

      margin-bottom: 18px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .confirm-actions .btn {
      min-width: 112px;
    }

    .modal-card {
      width: min(980px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: rgba(11, 16, 28, .94);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45);
      transform-origin: center;
      animation: tvOpen .28s ease-out;

    @keyframes tvOpen {
      0% { opacity: 0; transform: scaleX(.96) scaleY(.06); filter: brightness(1.25); }
      55% { opacity: 1; transform: scaleX(1.02) scaleY(.18); }
      100% { opacity: 1; transform: scaleX(1) scaleY(1); }

    .modal-top {
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(180deg, rgba(11,16,28,.98), rgba(11,16,28,.92));
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);

    .modal-head { padding: 16px 18px 14px; }

    .modal-cover {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,.06);

    .modal-title-row {
      display: flex;

      align-items: flex-start;
      justify-content: space-between;

    }

    .modal-title {
      font-size: 28px;
      font-weight: 900;
      margin: 0;
    }

    .modal-close {
      appearance: none;
      border: 0;
      background: rgba(255,255,255,.06);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
    }

    .modal-body { padding: 18px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0 4px;
    }

    .footer {
      flex: 0 0 auto;
      padding: 18px 20px 26px;
      text-align: center;
      color: rgba(136, 149, 173, 0.56);
      font-size: 13px;
      line-height: 1.65;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(16, 22, 38, .95);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      box-shadow: var(--shadow);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show { opacity: 1; }

    .scroll-top-btn {
      position: fixed;
      right: 28px;
      bottom: 96px;
      z-index: 50;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(10, 16, 28, .92);
      color: #ecf2fb;
      display: inline-grid;
      place-items: center;
      box-shadow: 0 18px 34px rgba(0,0,0,.28);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(.96);
      transition: .18s ease;
      backdrop-filter: blur(10px);
    }

    .scroll-top-btn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .scroll-top-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;

    }

    @media (max-width: 860px) {
      .topbar { padding-inline: 18px; }
      .view { padding-inline: 18px; }
      .hero { margin-top: 60px; }
      .search-inner { flex-wrap: wrap; }
      .search-shell { border-radius: 22px; }
      .result-head img { width: 100%; height: 180px; }
      .path-row { grid-template-columns: auto 1fr; }
      .path-actions { margin-left: 30px; flex-wrap: wrap; justify-content: flex-start; }
      .library-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">👻</div>
        <div>
          <div class="brand-title">Ghost Hunter Pro</div>
          <div class="brand-sub"><span id="app-version-label">v2.3.5</span> • <span class="desktop">Desktop Mode</span></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab home-nav active" data-action="switch-tab" data-tab="home"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M4 11.5 12 5l8 6.5"></path><path d="M7 10.5V19h10v-8.5"></path><path d="M10 19v-4.5h4V19"></path></svg></span>Home</button>
        <button class="tab settings-nav" data-action="switch-tab" data-tab="settings"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"></path><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1 0 2.8l-.3.3a2 2 0 0 1-2.8 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-2 2h-.5a2 2 0 0 1-2-2v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8 0l-.3-.3a2 2 0 0 1 0-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1-2-2v-.5a2 2 0 0 1 2-2h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 0-2.8l.3-.3a2 2 0 0 1 2.8 0l.1.1a1 1 0 0 0 1.1.2h0a1 1 0 0 0 .6-.9V4a2 2 0 0 1 2-2h.5a2 2 0 0 1 2 2v.2a1 1 0 0 0 .6.9h0a1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 0l.3.3a2 2 0 0 1 0 2.8l-.1.1a1 1 0 0 0-.2 1.1v0a1 1 0 0 0 .9.6H20a2 2 0 0 1 2 2v.5a2 2 0 0 1-2 2h-.2a1 1 0 0 0-.9.6z"></path></svg></span>Settings</button>
      </div>
    </header>

    <div class="view-wrap">
      <section id="view-home" class="view active"></section>
      <section id="view-library" class="view"></section>
      <section id="view-settings" class="view"></section>
    </div>

    <footer class="footer">
      <span id="app-footer-version">Ghost Hunter Pro v2.3.5</span> • Not affiliated with Valve or Steam<br />
      Paths are generated based on common known locations. Always verify before deleting.
    </footer>
  </div>

  <div id="modal-overlay" class="modal-overlay"></div>
  <div id="confirm-overlay" class="modal-overlay"></div>
  <div id="toast" class="toast"></div>

  <script>
    const state = {
      backendReady: false,
      activeTab: 'home',
      homeLoading: false,
      homeResult: null,
      homeQuery: '',
      homeSuggestions: [],
      homeHistory: [],
      libraryLoading: false,
      libraryLoaded: false,
      libraryItems: [],
      libraryQuery: '',
      libraryFilter: 'active',
      selectedLibraryAppIds: [],
      libraryShowScrollTop: false,
      settingsInfo: null,
      settingsTab: 'updates',
      updateInfo: null,
      modalGameId: null,
      confirmDialog: null,
    };

    let suggestionTimer = null;
    let confirmResolver = null;

    const $home = document.getElementById('view-home');
    const $library = document.getElementById('view-library');
    const $settings = document.getElementById('view-settings');
    const $modal = document.getElementById('modal-overlay');
    const $confirm = document.getElementById('confirm-overlay');
    const $toast = document.getElementById('toast');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function formatSize(size) {
      const num = Number(size || 0);
      if (!num) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = num;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(1)} ${units[idx]}`;
    }

    function toast(message) {
      $toast.textContent = message;
      $toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => $toast.classList.remove('show'), 2200);
    }

    async function waitForBackend() {
      if (window.pywebview && window.pywebview.api) return true;
      return new Promise(resolve => {
        let done = false;
        const finish = value => {
          if (done) return;
          done = true;
          resolve(value);
        };
        document.addEventListener('pywebviewready', () => finish(true), { once: true });
        const poll = setInterval(() => {
          if (window.pywebview && window.pywebview.api) {
            clearInterval(poll);
            finish(true);
          }
        }, 100);
        setTimeout(() => {
          clearInterval(poll);
          finish(!!(window.pywebview && window.pywebview.api));
        }, 3500);
      });
    }

    async function apiCall(method, ...args) {
      if (!(window.pywebview && window.pywebview.api && window.pywebview.api[method])) {
        throw new Error('Desktop backend not available');
      }
      return window.pywebview.api[method](...args);
    }

    function categoryIcon(category) {
      if (category.startsWith('Crack Leftovers')) return '🔍';
      if (category.startsWith('Steam ')) return '🎯';
      if (category === 'NVIDIA') return '🎮';
      if (category === 'Documents' || category === 'Public Documents') return '📄';
      if (category === 'Saved Games') return '💾';
      if (category === 'Temp Files') return '🗑';
      return '📁';
    }

    function groupedPaths(paths) {
      const groups = new Map();
      for (const path of paths || []) {
        const list = groups.get(path.category) || [];
        list.push(path);
        groups.set(path.category, list);
      }
      return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    }

    function getFilteredLibraryItems() {
      const query = state.libraryQuery.trim().toLowerCase();
      return state.libraryItems.filter(item => {
        if (state.libraryFilter === 'active' && item.archived) return false;
        if (state.libraryFilter === 'archived' && !item.archived) return false;
        if (!query) return true;
        return item.name.toLowerCase().includes(query) || String(item.appid).includes(query);
      });
    }

    function countActive() {
      return state.libraryItems.filter(item => !item.archived).length;
    }

    function countArchived() {
      return state.libraryItems.filter(item => item.archived).length;
    }

    function selectedLibraryCount() {
      return state.selectedLibraryAppIds.length;
    }

    function isLibrarySelected(appid) {
      return state.selectedLibraryAppIds.includes(String(appid));
    }

    function syncSelectedLibraryIds() {
      const available = new Set(state.libraryItems.map(item => String(item.appid)));
      state.selectedLibraryAppIds = state.selectedLibraryAppIds.filter(appid => available.has(String(appid)));
    }

    function toggleLibrarySelection(appid) {
      const key = String(appid);
      if (isLibrarySelected(key)) {
        state.selectedLibraryAppIds = state.selectedLibraryAppIds.filter(value => value !== key);
      } else {
        state.selectedLibraryAppIds = [...state.selectedLibraryAppIds, key];
      }
    }

    function collectSelectedLibraryPaths() {
      const selected = new Set(state.selectedLibraryAppIds.map(String));
      return state.libraryItems
        .filter(item => selected.has(String(item.appid)))
        .flatMap(item => (item.paths || []).map(path => path.path));
    }

    function selectedHomePaths() {
      return [...document.querySelectorAll('.home-path-check:checked')].map(el => el.dataset.path).filter(Boolean);
    }

    function selectedModalPaths() {
      return [...document.querySelectorAll('.modal-path-check:checked')].map(el => el.dataset.path).filter(Boolean);
    }

    function copyText(text) {
      const area = document.createElement('textarea');
      area.value = text;
      area.style.position = 'fixed';
      area.style.opacity = '0';
      document.body.appendChild(area);
      area.focus();
      area.select();
      try {
        document.execCommand('copy');
        toast('Copied');
      } catch {
        toast('Copy failed');
      }
      document.body.removeChild(area);
    }

    async function openSteamDB(appid) {
      try {
        await apiCall('open_url', `https://steamdb.info/app/${appid}/`);
      } catch {
        toast('Could not open SteamDB');
      }
    }

    async function openPath(path) {
      try {
        const response = await apiCall('open_path', path);
        if (!response.ok) throw new Error(response.error || 'Could not open path');
      } catch (error) {
        toast(error.message || 'Could not open path');
      }
    }

    async function downloadInstallerUpdate() {
      if (!state.updateInfo || !state.updateInfo.installer_url) {
        toast('No installer update available');
        return;
      }
      const ok = await showConfirm({
        title: 'Download installer update',
        message: 'The installer update will be downloaded and then launched. The installer may close the app while updating. Continue?',
        confirmText: 'Download & Launch',
        cancelText: 'Cancel',
      });
      if (!ok) return;
      const download = await apiCall('download_update_installer', state.updateInfo.installer_url);
      if (!download.ok) {
        toast(download.error || 'Download failed');
        return;
      }
      const launch = await apiCall('launch_update_installer', download.path);
      if (!launch.ok) {
        toast(launch.error || 'Could not launch installer');
        return;
      }
      toast('Installer launched');
    }

    async function downloadPortableUpdate() {
      if (!state.updateInfo || !state.updateInfo.portable_url) {
        toast('No portable update available');
        return;
      }
      const download = await apiCall('download_portable_update', state.updateInfo.portable_url);
      if (!download.ok) {
        toast(download.error || 'Download failed');
        return;
      }
      toast('Portable package downloaded');
      if (download.folder) {
        await openPath(download.folder);
      }
    }

    async function updateSuggestions(query) {
      const clean = (query || '').trim();
      if (clean.length < 2) {
        state.homeSuggestions = [];
        renderHome();
        return;
      }
      try {
        const suggestions = await apiCall('search_suggestions', clean);
        const currentInput = document.getElementById('home-search-input');
        const liveValue = (currentInput && currentInput.value ? currentInput.value : state.homeQuery).trim();
        if (liveValue !== clean) return;
        state.homeSuggestions = Array.isArray(suggestions) ? suggestions.slice(0, 6) : [];
        renderHome();
        const input = document.getElementById('home-search-input');
        if (input) {
          input.focus();
          input.setSelectionRange(clean.length, clean.length);
        }
      } catch {
        state.homeSuggestions = [];
        renderHome();
      }
    }

    async function loadHistory() {
      try {
        const history = await apiCall('get_history');
        state.homeHistory = Array.isArray(history) ? history : [];
      } catch {
        state.homeHistory = [];
      }
    }

    async function loadSettingsInfo() {
      try {
        state.settingsInfo = await apiCall('get_settings_info');
      } catch {
        state.settingsInfo = null;
      }
      applyVersionLabels();

    function applyVersionLabels() {
      const version = state.settingsInfo && state.settingsInfo.current_version ? state.settingsInfo.current_version : '2.3.5';
      const top = document.getElementById('app-version-label');
      const footer = document.getElementById('app-footer-version');
      if (top) top.textContent = `v${version}`;
      if (footer) footer.textContent = `Ghost Hunter Pro v${version}`;

      try {
        state.updateInfo = await apiCall('check_for_updates');
      } catch (error) {
        state.updateInfo = { ok: false, configured: false, error: error.message || 'Update check failed.' };
      }
      renderSettings();
      renderTabs();

    function renderTabs() {

    function renderConfirm() {
      if (!state.confirmDialog) {
        $confirm.classList.remove('show');
        $confirm.innerHTML = '';
        return;
      }
      const dialog = state.confirmDialog;
      $confirm.classList.add('show');
      $confirm.innerHTML = `
        <div class="confirm-card card" role="dialog" aria-modal="true">
          <h3 class="confirm-title">${escapeHtml(dialog.title || 'Confirm action')}</h3>
          <div class="confirm-text">${escapeHtml(dialog.message || '')}</div>
          <div class="confirm-actions">
            <button class="btn" data-action="confirm-cancel">${escapeHtml(dialog.cancelText || 'Cancel')}</button>
            <button class="btn primary" data-action="confirm-ok">${escapeHtml(dialog.confirmText || 'Confirm')}</button>
          </div>
        </div>
      `;
    }

    function settleConfirm(value) {
      const resolver = confirmResolver;
      confirmResolver = null;
      state.confirmDialog = null;
      renderConfirm();
      if (resolver) resolver(value);
    }

    function showConfirm({ title, message, confirmText = 'Delete', cancelText = 'Cancel' }) {
      state.confirmDialog = { title, message, confirmText, cancelText };
      renderConfirm();
      return new Promise(resolve => {
        confirmResolver = resolve;
      });
    }

        button.classList.toggle('show', show);

          <button class="btn" data-action="settings-open-releases" ${configured ? '' : 'disabled'}>Open Releases</button>
        </div>
      `;

          updatesTab = `
            <div class="settings-note">Update available\nCurrent: ${escapeHtml(update.current_version || '')}\nLatest: ${escapeHtml(update.latest_version || '')}</div>
            <div class="settings-actions">
              <button class="btn primary" data-action="settings-download-installer" ${update.installer_url ? '' : 'disabled'}>Download Installer Update</button>
              <button class="btn" data-action="settings-download-portable" ${update.portable_url ? '' : 'disabled'}>Download Portable Package</button>
              <button class="btn" data-action="settings-open-releases" ${configured ? '' : 'disabled'}>Open Releases</button>

            ${update.release_notes ? `<div class="settings-note">${escapeHtml(update.release_notes)}</div>` : ''}
          `;
        } else if (update.ok) {
          updatesTab = `
            <div class="settings-note">You are up to date.\nCurrent version: ${escapeHtml(update.current_version || info.current_version || '')}</div>

            <div class="settings-note">${escapeHtml(update.error || 'Update check failed.')}</div>
            <div class="settings-actions">
              <button class="btn primary" data-action="settings-check-updates">Try Again</button>
            </div>

      const buildsTab = `

            <div class="settings-value">${configured ? 'GitHub Releases configured' : 'GitHub Releases not configured yet'}</div>

    function renderAll() {
      renderHome();
      renderLibrary();
      renderSettings();
      renderTabs();
      renderModal();
      renderConfirm();
    }

    async function refreshLibrary(options = {}) {
      const keepModal = options.keepModal !== false;
      state.libraryLoading = true;
      renderAll();
      try {
        const response = await apiCall('scan_library');
        if (!response.ok) throw new Error(response.error || 'Failed to scan library');
        state.libraryItems = response.items || [];
        state.libraryLoaded = true;
      } catch (error) {
        toast(error.message || 'Library scan failed');
      } finally {
        state.libraryLoading = false;
        syncSelectedLibraryIds();
        if (keepModal && state.modalGameId && !state.libraryItems.some(item => String(item.appid) === String(state.modalGameId))) {
          state.modalGameId = null;
        }
        renderAll();
        updateLibraryScrollButton();
      }
    }

    async function runHomeSearch() {
      const input = document.getElementById('home-search-input');
      const query = (input && input.value ? input.value : '').trim();
      if (!query) return;
      state.homeQuery = query;
      state.homeLoading = true;
      state.homeResult = null;
      state.homeSuggestions = [];
      renderAll();
      try {
        const response = await apiCall('home_search', query);
        if (!response.ok) throw new Error(response.error || 'Search failed');
        state.homeResult = response;
        await loadHistory();
      } catch (error) {
        toast(error.message || 'Search failed');
      } finally {
        state.homeLoading = false;
        renderAll();
      }
    }

    async function deletePaths(paths, flags = {}) {
      if (!paths.length) {
        toast('Nothing selected');
        return;
      }
      const ok = await showConfirm({
        title: 'Confirm deletion',
        message: `Delete ${paths.length} selected path(s)?\n\nThis action cannot be undone.`,
        confirmText: 'Delete',
        cancelText: 'Cancel',
      });
      if (!ok) return;
      try {
        const response = await apiCall('delete_paths', paths);
        const failedCount = (response.failed || []).length;
        toast(failedCount ? `Deleted ${response.deleted} path(s), ${failedCount} failed` : `Deleted ${response.deleted} path(s)`);
        if (flags.refreshHome && state.homeQuery) {
          await runHomeSearch();
        }
        if (flags.refreshLibrary) {
          await refreshLibrary();
        }
      } catch (error) {
        toast(error.message || 'Delete failed');
      }
    }

    async function toggleArchive(appid, currentlyArchived) {
      try {
        await apiCall('set_archived', String(appid), !currentlyArchived);
        const item = state.libraryItems.find(game => String(game.appid) === String(appid));
        if (item) item.archived = !currentlyArchived;
        renderLibrary();
        renderTabs();
        if (state.modalGameId && String(state.modalGameId) === String(appid)) {
          renderModal();
        }
      } catch {
        toast('Archive action failed');
      }
    }

    document.addEventListener('submit', async event => {
      if (event.target && event.target.id === 'home-search-form') {
        event.preventDefault();
        await runHomeSearch();
      }
    });

    document.addEventListener('input', event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === 'library-filter-input') {
        const currentValue = target.value;
        const caret = typeof target.selectionStart === 'number' ? target.selectionStart : currentValue.length;
        state.libraryQuery = currentValue;
        renderLibrary();
        renderTabs();
        const restored = document.getElementById('library-filter-input');
        if (restored) {
          restored.focus();
          try { restored.setSelectionRange(caret, caret); } catch {}
        }
      }
      if (target.id === 'home-search-input') {
        state.homeQuery = target.value;
        clearTimeout(suggestionTimer);
        suggestionTimer = setTimeout(() => updateSuggestions(target.value), 220);
      }
    });

    document.addEventListener('click', async event => {
      const clickedInsideSearch = event.target.closest('.search-wrap');
      if (!clickedInsideSearch && state.homeSuggestions.length) {
        state.homeSuggestions = [];
        renderHome();
      }
      const actionEl = event.target.closest('[data-action]');
      if (!actionEl) {
        if (event.target === $modal) {
          state.modalGameId = null;
          renderModal();
        }
        if (event.target === $confirm) {
          settleConfirm(false);
        }
        return;
      }
      const action = actionEl.dataset.action;
      switch (action) {
        case 'confirm-ok':
          settleConfirm(true);
          break;
        case 'confirm-cancel':
          settleConfirm(false);
          break;
        case 'switch-tab':
          state.activeTab = actionEl.dataset.tab || 'home';
          renderTabs();
          updateLibraryScrollButton();
          if (state.activeTab === 'settings') {
            await refreshUpdateInfo();
          }
          break;
        case 'library-scan':
        case 'library-rescan':
          await refreshLibrary();
          break;
        case 'library-filter':
          state.libraryFilter = actionEl.dataset.filter || 'active';
          renderLibrary();
          renderTabs();
          break;
        case 'toggle-select-game':
          toggleLibrarySelection(actionEl.dataset.appid || '');
          renderLibrary();
          renderTabs();
          updateLibraryScrollButton();
          break;
        case 'library-delete-selected': {
          const selectedPaths = collectSelectedLibraryPaths();
          state.selectedLibraryAppIds = [];
          await deletePaths(selectedPaths, { refreshLibrary: true });
          renderLibrary();
          renderTabs();
          updateLibraryScrollButton();
          break;
        }
        case 'library-scroll-top': {
          const libraryView = document.getElementById('view-library');
          if (libraryView) libraryView.scrollTo({ top: 0, behavior: 'smooth' });
          break;
        }
        case 'open-game':
          state.modalGameId = actionEl.dataset.appid || null;
          renderModal();
          break;
        case 'close-modal':
          state.modalGameId = null;
          renderModal();
          break;
        case 'open-steamdb':
          await openSteamDB(actionEl.dataset.appid);
          break;
        case 'history-search':
          state.homeQuery = actionEl.dataset.name || actionEl.dataset.appid || '';
          state.homeSuggestions = [];
          renderHome();
          await runHomeSearch();
          break;
        case 'history-remove':
          await apiCall('remove_history_item', actionEl.dataset.appid || '');
          await loadHistory();
          renderHome();
          break;
        case 'clear-history':
          await apiCall('clear_history');
          await loadHistory();
          renderHome();
          break;
        case 'settings-tab':
          state.settingsTab = actionEl.dataset.settingsTab || 'updates';
          renderSettings();
          renderTabs();
          break;
        case 'settings-check-updates':
          state.settingsTab = 'updates';
          await refreshUpdateInfo();
          break;
        case 'settings-open-releases':
          if (state.settingsInfo && state.settingsInfo.repo_url) {
            const result = await apiCall('open_releases_page');
            if (!result.ok) toast(result.error || 'Could not open releases page');
          }
          break;
        case 'settings-download-installer':
          await downloadInstallerUpdate();
          break;
        case 'settings-download-portable':
          await downloadPortableUpdate();
          break;
        case 'toggle-archive':
          await toggleArchive(actionEl.dataset.appid, actionEl.dataset.archived === '1');
          break;
        case 'open-path':
          await openPath(actionEl.dataset.path || '');
          break;
        case 'copy-path':
          copyText(actionEl.dataset.path || '');
          break;
        case 'pick-suggestion':
          state.homeQuery = actionEl.dataset.name || actionEl.dataset.appid || '';
          state.homeSuggestions = [];
          renderHome();
          await runHomeSearch();
          break;
        case 'delete-path':
          await deletePaths([actionEl.dataset.path].filter(Boolean), {
            refreshHome: !!document.querySelector('.home-results.visible'),
            refreshLibrary: !!state.libraryLoaded,
          });
          break;
        case 'home-clear':
          clearHomeView();
          break;
        case 'home-copy-selected': {
          const paths = selectedHomePaths();
          if (!paths.length) toast('Nothing selected');
          else copyText(paths.join('\n'));
          break;
        }
        case 'home-delete-selected':
          await deletePaths(selectedHomePaths(), { refreshHome: true });
          break;
        case 'home-delete-all':
          await deletePaths((state.homeResult?.paths || []).map(item => item.path), { refreshHome: true });
          break;
        case 'modal-delete-selected':
          await deletePaths(selectedModalPaths(), { refreshLibrary: true });
          break;
        case 'modal-delete-all': {
          const item = state.libraryItems.find(game => String(game.appid) === String(actionEl.dataset.appid));
          await deletePaths((item?.paths || []).map(path => path.path), { refreshLibrary: true });
          break;
        }
      }
    });

    async function bootstrap() {
      renderAll();
      state.backendReady = await waitForBackend();
      if (!state.backendReady) {
        toast('Desktop backend not available');
        return;
      }
      try {
        await apiCall('ping');
      } catch {
        toast('Desktop backend not available');
        return;
      }
      const libraryView = document.getElementById('view-library');
      if (libraryView) {
        libraryView.addEventListener('scroll', updateLibraryScrollButton);
      }
      await loadHistory();
      await loadSettingsInfo();
      state.libraryLoading = true;
      renderAll();
      await refreshLibrary();
      updateLibraryScrollButton();
    }

    bootstrap();
  </script>
</body>
</html>
