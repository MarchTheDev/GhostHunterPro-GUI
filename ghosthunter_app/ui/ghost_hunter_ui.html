<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghost Hunter Pro</title>
  <style>
    @font-face {
      font-family: 'GH Roboto Slab';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/roboto-slab-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Slab';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/roboto-slab-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Atkinson Hyperlegible';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/atkinson-hyperlegible-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Atkinson Hyperlegible';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/atkinson-hyperlegible-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH DM Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/dm-mono-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH DM Mono';
      font-style: normal;
      font-weight: 500 700;
      font-display: swap;
      src: url('./fonts/dm-mono-medium.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH JetBrains Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/jetbrains-mono-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH JetBrains Mono';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/jetbrains-mono-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Condensed';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/roboto-condensed-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Condensed';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/roboto-condensed-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Fraktur';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('./fonts/unifrakturmaguntia-regular.ttf') format('truetype');
    }

    :root {
      --bg: #070b14;
      --panel: rgba(18, 25, 42, 0.82);
      --panel-2: rgba(23, 33, 54, 0.9);
      --border: rgba(255,255,255,0.08);
      --text: #ecf2fb;
      --muted: #8a96ad;
      --cyan: #1ac7ff;
      --cyan-2: #0bb2e3;
      --purple: #a24cff;
      --brand-mid: #6aa7ff;
      --brand-end: #b883ff;
      --glow-cyan: rgba(26,199,255,.18);
      --glow-purple: rgba(162,76,255,.12);
      --surface-cyan: rgba(17,183,223,.18);
      --surface-purple: rgba(162,76,255,.16);
      --surface-cyan-strong: rgba(17,183,223,.24);
      --surface-purple-strong: rgba(162,76,255,.22);
      --green: #22c76e;
      --red: #ff5b57;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
      --radius: 18px;
      --app-font-stack: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
    }



    .lucide-icon {
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vertical-align: -0.15em;
    }

    .icon-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 7px;
    }

    .preset-modal-card {
      width: min(440px, 100%);
      background: rgba(11, 16, 28, .97);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      box-shadow: 0 32px 90px rgba(0,0,0,.46), 0 0 26px var(--glow-cyan);
      padding: 18px;
      animation: tvOpen .22s ease-out;
    }

    .preset-modal-input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      padding: 0 13px;
      outline: none;
      font-size: 15px;
      font-weight: 800;
    }

    .preset-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .preset-card {
      position: relative;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      padding: 10px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: .16s ease;
    }

    .preset-card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--cyan) 20%, transparent);
      box-shadow: 0 0 16px var(--glow-cyan);
    }

    .preset-card-preview {
      height: 54px;
      border-radius: 12px;
      margin-bottom: 9px;
      border: 1px solid rgba(255,255,255,.07);
      background: linear-gradient(135deg, #0a1322, var(--preset-color), var(--preset-color2, color-mix(in srgb, var(--preset-color) 65%, #fb7185)));
    }

    .preset-card-name {
      font-size: 13px;
      font-weight: 900;
      padding-right: 32px;
    }

    .preset-card .theme-card-main {
      min-height: 0;
      display: block;
    }

    .preset-delete {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 25px;
      height: 25px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 9px;
      background: rgba(255,91,87,.16);
      color: #ffd8d6;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .custom-edit-btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      margin-top: 12px;
      width: 100%;
      justify-content: center;
      color: #fff;
      border-color: color-mix(in srgb, var(--cyan) 44%, transparent);
      background:
        radial-gradient(circle at 18% 50%, color-mix(in srgb, var(--cyan) 28%, transparent), transparent 34%),
        linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cyan) 10%, transparent),
        0 0 26px var(--glow-cyan),
        0 0 20px var(--glow-purple),
        inset 0 0 0 1px rgba(255,255,255,.06);
      animation: customEditGlow 2.4s ease-in-out infinite;
    }

    .custom-edit-btn::after {
      content: "";
      position: absolute;
      inset: -40% auto -40% -55%;
      width: 54%;
      z-index: -1;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.20), transparent);
      transform: rotate(18deg);
      transition: .24s ease;
    }

    .custom-edit-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--cyan) 64%, transparent);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cyan) 18%, transparent),
        0 0 38px var(--glow-cyan),
        0 0 28px var(--glow-purple),
        inset 0 0 0 1px rgba(255,255,255,.10);
    }

    .custom-edit-btn:hover::after {
      left: 110%;
    }

    @keyframes customEditGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.16); }
    }

    .second-color-toggle {
      border-color: color-mix(in srgb, var(--cyan) 22%, rgba(255,255,255,.08));
      background: rgba(255,255,255,.045);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035), 0 0 12px color-mix(in srgb, var(--cyan) 10%, transparent);
    }

    .second-color-toggle.active {
      color: #fff;
      border-color: color-mix(in srgb, var(--cyan) 36%, transparent);
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      box-shadow: 0 0 18px var(--glow-cyan), inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .custom-theme-modal-card {
      width: min(900px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: rgba(11, 16, 28, .96);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45), 0 0 30px var(--glow-cyan);
      animation: tvOpen .24s ease-out;
    }

    .custom-theme-modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(11,16,28,.98), rgba(11,16,28,.92));
      backdrop-filter: blur(12px);
    }

    .custom-theme-modal-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .custom-theme-modal-preview {
      width: 100%;
      height: 124px;
      min-height: 124px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--cyan) 20%, rgba(255,255,255,.08));
      background:
        radial-gradient(circle at 18% 26%, color-mix(in srgb, var(--custom-accent, #d946ef) 48%, transparent), transparent 34%),
        linear-gradient(135deg, #0a1322, var(--custom-accent, #d946ef) 58%, var(--custom-shade-accent, var(--custom-accent-2, #fb7185)));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 30px var(--glow-cyan);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }
    body {
      margin: 0;
      color: var(--text);
      font-family: var(--app-font-stack);
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(84,25,166,0.12), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(24,163,211,0.08), transparent 75%),
        linear-gradient(180deg, #08101b 0%, #070b14 100%);
      overflow: hidden;
    }

    body[data-theme="midnight"] {
      --cyan: #7bd7ff;
      --cyan-2: #4fb9ff;
      --purple: #6f8dff;
      --brand-mid: #7ea8ff;
      --brand-end: #9cb4ff;
      --glow-cyan: rgba(79,185,255,.18);
      --glow-purple: rgba(111,141,255,.12);
      --surface-cyan: rgba(79,185,255,.16);
      --surface-purple: rgba(111,141,255,.14);
      --surface-cyan-strong: rgba(79,185,255,.24);
      --surface-purple-strong: rgba(111,141,255,.22);
      --red: #ff6b7a;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(44,81,165,0.16), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(45,130,188,0.10), transparent 75%),
        linear-gradient(180deg, #081019 0%, #09111d 100%);
    }



    body[data-theme="rubellite"] {
      --cyan: #ff4b75;
      --cyan-2: #660011;
      --purple: #b3133b;
      --brand-mid: #a30f32;
      --brand-end: #ff4b75;
      --glow-cyan: rgba(102,0,17,.30);
      --glow-purple: rgba(179,19,59,.18);
      --surface-cyan: rgba(102,0,17,.22);
      --surface-purple: rgba(179,19,59,.18);
      --surface-cyan-strong: rgba(102,0,17,.32);
      --surface-purple-strong: rgba(179,19,59,.28);
      --red: #ff5f8f;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(102,0,17,0.26), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(179,19,59,0.12), transparent 75%),
        linear-gradient(180deg, #110817 0%, #090712 100%);
    }

    body[data-theme="custom"] {
      --cyan: var(--custom-accent, #d946ef);
      --cyan-2: var(--custom-accent, #d946ef);
      --purple: var(--custom-accent-2, #fb7185);
      --brand-mid: var(--custom-accent, #d946ef);
      --brand-end: var(--custom-accent-2, #fb7185);
      --glow-cyan: color-mix(in srgb, var(--custom-accent, #d946ef) 22%, transparent);
      --glow-purple: color-mix(in srgb, var(--custom-accent-2, #fb7185) 16%, transparent);
      --surface-cyan: color-mix(in srgb, var(--custom-accent, #d946ef) 17%, transparent);
      --surface-purple: color-mix(in srgb, var(--custom-accent-2, #fb7185) 15%, transparent);
      --surface-cyan-strong: color-mix(in srgb, var(--custom-accent, #d946ef) 26%, transparent);
      --surface-purple-strong: color-mix(in srgb, var(--custom-accent-2, #fb7185) 22%, transparent);
      background:
        radial-gradient(900px 500px at 50% 40%, color-mix(in srgb, var(--custom-accent, #d946ef) 16%, transparent), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, color-mix(in srgb, var(--custom-accent-2, #fb7185) 10%, transparent), transparent 75%),
        linear-gradient(180deg, #080b14 0%, #070812 100%);
    }

    body[data-theme="ember"] {
      --cyan: #ffb26b;
      --cyan-2: #ff8a3d;
      --purple: #ff4d6d;
      --brand-mid: #ff9a52;
      --brand-end: #ff6884;
      --glow-cyan: rgba(255,138,61,.18);
      --glow-purple: rgba(255,77,109,.12);
      --surface-cyan: rgba(255,138,61,.16);
      --surface-purple: rgba(255,77,109,.14);
      --surface-cyan-strong: rgba(255,138,61,.24);
      --surface-purple-strong: rgba(255,77,109,.22);
      --red: #ff5b57;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(150,39,53,0.15), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(201,102,29,0.10), transparent 75%),
        linear-gradient(180deg, #120b0c 0%, #0c0b13 100%);
    }

    body[data-font="inter"] {
      --app-font-stack: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
    }



    body[data-font="system"] {
      --app-font-stack: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-font="dm-mono"] {
      --app-font-stack: "GH DM Mono", "DM Mono", ui-monospace, monospace;
    }

    body[data-font="trebuchet"] {
      --app-font-stack: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    }

    body[data-font="georgia"] {
      --app-font-stack: Georgia, Cambria, "Times New Roman", serif;
    }

    body[data-font="mono"] {
      --app-font-stack: "GH JetBrains Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }

    body[data-font="roboto-condensed"] {
      --app-font-stack: "GH Roboto Condensed", "Roboto Condensed", "Arial Narrow", sans-serif;
    }

    body[data-font="fraktur"] {
      --app-font-stack: "GH Fraktur", "UnifrakturMaguntia", "Old English Text MT", serif;
    }

    body[data-font="roboto-slab"] {
      --app-font-stack: "GH Roboto Slab", "Roboto Slab", Georgia, Cambria, "Times New Roman", serif;
    }

    body[data-font="atkinson-hyperlegible"] {
      --app-font-stack: "GH Atkinson Hyperlegible", "Atkinson Hyperlegible", Inter, Segoe UI, system-ui, sans-serif;
    }

    body[data-theme="emerald"] {
      --cyan: #4fffd1;
      --cyan-2: #1fd0a6;
      --purple: #3fbf7c;
      --brand-mid: #6ef8d6;
      --brand-end: #66dd9b;
      --glow-cyan: rgba(31,208,166,.18);
      --glow-purple: rgba(63,191,124,.12);
      --surface-cyan: rgba(31,208,166,.16);
      --surface-purple: rgba(63,191,124,.14);
      --surface-cyan-strong: rgba(31,208,166,.24);
      --surface-purple-strong: rgba(63,191,124,.22);
      --red: #ff6f61;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(27,123,91,0.14), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(33,181,126,0.08), transparent 75%),
        linear-gradient(180deg, #07130f 0%, #07100d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(32, 54, 88, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 54, 88, 0.18) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,.85), rgba(255,255,255,.35));
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(106, 131, 170, .7) rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,.04);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(108,128,161,.92), rgba(80,98,128,.92));
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(132,153,190,.96), rgba(95,113,146,.96));
    }

    .app {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 18px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      font-size: 24px;
      line-height: 1;
      text-shadow: 0 0 12px rgba(26,199,255,.55);
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: .2px;
      font-size: 18px;
      background: linear-gradient(90deg, var(--cyan), var(--brand-mid) 55%, var(--brand-end) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .brand-sub .desktop {
      color: var(--cyan);
      font-weight: 600;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 28px var(--glow-cyan);
      backdrop-filter: blur(12px);
    }

    .tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 15px;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: .2s ease;
    }

    .tab.active {
      background: rgba(255,255,255,.10);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 0 20px rgba(118,97,255,.12);
    }

    .tab.home-nav {
      min-width: 132px;
      background: linear-gradient(90deg, var(--surface-cyan), var(--surface-purple));
      border: 1px solid rgba(126,217,255,.16);
      color: #eef8ff;
      box-shadow: 0 0 18px var(--glow-cyan), inset 0 1px 0 rgba(255,255,255,.05);
    }

    .tab.home-nav:hover {
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      transform: translateY(-1px);
    }

    .tab.home-nav.active {
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 24px var(--glow-cyan);
    }

    .tab.settings-nav {
      min-width: 140px;
      background: linear-gradient(90deg, var(--surface-cyan), var(--surface-purple));
      border: 1px solid rgba(126,217,255,.14);
      color: #eef8ff;
      box-shadow: 0 0 18px var(--glow-cyan), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .tab.settings-nav:hover {
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      transform: translateY(-1px);
    }

    .tab.settings-nav.active {
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      color: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 24px var(--glow-cyan);
    }

    .tab-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      margin-right: 8px;
      vertical-align: -5px;
      color: var(--cyan);
      background: color-mix(in srgb, var(--cyan) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--cyan) 18%, transparent);
      border-radius: 8px;
      filter: drop-shadow(0 0 6px var(--glow-cyan));
    }

    .tab.active .tab-icon {
      color: white;
    }

    .tab-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .inline-icon {
      display: inline-flex;
      width: 14px;
      height: 14px;
      vertical-align: -2px;
      margin-right: 6px;
    }

    .inline-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .view-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .view {
      display: none;

    .search-clear-btn {

      align-items: center;

      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;

    .select-fab.active {

      border-color: rgba(163, 238, 255, .22);

    .card-body { padding: 14px 14px 16px; }

    .game-title {
      font-size: 16px;
      font-weight: 800;

      width: min(460px, 100%);
      background: rgba(11, 16, 28, .97);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      box-shadow: 0 32px 90px rgba(0,0,0,.46);
      padding: 18px;
      animation: tvOpen .22s ease-out;
    }

    .selection-card {
      width: min(1000px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: rgba(11, 16, 28, .97);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;

      animation: fadeSoftIn .18s ease-out;

    @keyframes overlayFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }

    @keyframes fadeSoftIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .selection-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .selection-title {
      font-size: 24px;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .selection-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .selection-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0 18px;
    }

    .selection-game {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .selection-game.expanded {
      border-color: color-mix(in srgb, var(--cyan) 12%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--cyan) 10%, transparent);

      gap: 14px;

      cursor: pointer;
      background: rgba(255,255,255,.025);

      display: flex;
      gap: 14px;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;

    .selection-thumb,
    .selection-thumb-fallback {
      width: 54px;
      height: 54px;

      flex: 0 0 auto;
      background: rgba(255,255,255,.05);

      color: rgba(255,255,255,.35);

      color: var(--muted);

    }

      padding: 0 16px;
      border-top: 1px solid transparent;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-6px);
      transition: max-height .22s ease, opacity .18s ease, transform .18s ease, padding .18s ease, border-color .18s ease;
    }

    .selection-game.expanded .selection-game-body {
      padding: 0 16px 16px;
      border-top-color: rgba(255,255,255,.05);
      max-height: 1400px;
      opacity: 1;
      transform: translateY(0);
    }

    .confirm-title {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 10px;
    }

    .confirm-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-line;
      margin-bottom: 18px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .confirm-actions .btn {
      min-width: 112px;
    }

    .modal-card {
      width: min(980px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: rgba(11, 16, 28, .94);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45);
      transform-origin: center;
      animation: tvOpen .28s ease-out;
    }

    @keyframes tvOpen {
      0% { opacity: 0; transform: scaleX(.96) scaleY(.06); filter: brightness(1.25); }
      55% { opacity: 1; transform: scaleX(1.02) scaleY(.18); }
      100% { opacity: 1; transform: scaleX(1) scaleY(1); }
    }


    @keyframes tvClose {
      0% { opacity: 1; transform: scaleX(1) scaleY(1); }
      45% { opacity: 1; transform: scaleX(1.02) scaleY(.18); filter: brightness(1.18); }
      100% { opacity: 0; transform: scaleX(.96) scaleY(.04); filter: brightness(1.35); }
    }

    .modal-top {
      position: sticky;
      top: 0;
      z-index: 2;
      background: linear-gradient(180deg, rgba(11,16,28,.98), rgba(11,16,28,.92));
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);

      margin: 0;

      border: 0;
      background: rgba(255,255,255,.06);
      color: white;

      height: 40px;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;

      flex-wrap: wrap;
      margin: 14px 0 4px;
    }

    .footer {
      flex: 0 0 auto;
      padding: 18px 20px 26px;

      color: rgba(136, 149, 173, 0.56);
      font-size: 13px;
      line-height: 1.65;
    }

    .toast {

      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(16, 22, 38, .95);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      box-shadow: var(--shadow);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      max-width: 90vw;
      text-align: center;

    .update-notice-wrap {

    .update-notice {
      padding: 16px;
      background: rgba(11, 18, 32, .96);
      border: 1px solid rgba(120, 227, 255, .16);
      box-shadow: 0 22px 48px rgba(0,0,0,.34), 0 0 22px var(--glow-cyan);
      animation: fadeSoftIn .18s ease-out;
    }

    .update-notice-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .update-notice-title {
      font-size: 16px;
      font-weight: 900;
      color: #eff8ff;
      margin-bottom: 4px;
    }

    .update-notice-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .update-notice-close {
      appearance: none;
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      color: #f3fbff;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .update-notice-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .scroll-top-btn {
      position: fixed;
      right: 28px;
      bottom: 96px;
      z-index: 50;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255,255,255,.12);

      background: rgba(10, 16, 28, .92);

      place-items: center;
      box-shadow: 0 18px 34px rgba(0,0,0,.28);

      opacity: 0;
      pointer-events: none;
      transform: translateY(8px) scale(.96);
      transition: .18s ease;
      backdrop-filter: blur(10px);
    }

    .scroll-top-btn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .scroll-top-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 860px) {
      .topbar { padding-inline: 18px; }
      .update-notice-wrap { top: 92px; right: 18px; width: min(360px, calc(100vw - 24px)); }

      .library-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }

        <div>
          <div class="brand-title">Ghost Hunter Pro</div>
          <div class="brand-sub"><span id="app-version-label">v3.1</span> • <span class="desktop">Desktop Mode</span></div>

        <button class="tab settings-nav" data-action="switch-tab" data-tab="settings"><span class="tab-icon"><svg viewBox="0 0 24 24"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"></path><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1 0 2.8l-.3.3a2 2 0 0 1-2.8 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-2 2h-.5a2 2 0 0 1-2-2v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8 0l-.3-.3a2 2 0 0 1 0-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1-2-2v-.5a2 2 0 0 1 2-2h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 0-2.8l.3-.3a2 2 0 0 1 2.8 0l.1.1a1 1 0 0 0 1.1.2h0a1 1 0 0 0 .6-.9V4a2 2 0 0 1 2-2h.5a2 2 0 0 1 2 2v.2a1 1 0 0 0 .6.9h0a1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 0l.3.3a2 2 0 0 1 0 2.8l-.1.1a1 1 0 0 0-.2 1.1v0a1 1 0 0 0 .9.6H20a2 2 0 0 1 2 2v.5a2 2 0 0 1-2 2h-.2a1 1 0 0 0-.9.6z"></path></svg></span>Settings</button>

    <div class="view-wrap">
      <section id="view-home" class="view active"></section>
      <section id="view-library" class="view"></section>
      <section id="view-settings" class="view"></section>
    </div>

    <footer class="footer">
      <span id="app-footer-version">Ghost Hunter Pro v3.1</span> • Not affiliated with Valve or Steam<br />
      Paths are generated based on common known locations. Always verify before deleting.
    </footer>
  </div>

  <div id="modal-overlay" class="modal-overlay"></div>
  <div id="confirm-overlay" class="modal-overlay"></div>
  <div id="selection-overlay" class="modal-overlay"></div>
  <div id="preset-overlay" class="modal-overlay"></div>
  <div id="custom-theme-overlay" class="modal-overlay"></div>
  <div id="toast" class="toast"></div>
  <div id="update-notice-root"></div>

  <script>
    const state = {
      backendReady: false,
      activeTab: 'home',
      homeLoading: false,
      homeResult: null,
      homeQuery: '',
      homeCursor: null,
      homeSuggestions: [],
      homeHistory: [],
      libraryLoading: false,
      libraryPreloading: false,
      libraryLoaded: false,
      libraryItems: [],
      libraryQuery: '',
      libraryFilter: 'visible',
      selectedLibraryAppIds: [],
      libraryShowScrollTop: false,
      settingsInfo: null,
      settingsTab: 'about',
      updateInfo: null,
      updateNotice: null,
      updateNoticeDismissed: false,
      bulkReviewOpen: false,
      bulkExpandedAppIds: [],
      modalGameId: null,
      modalClosing: false,
      confirmDialog: null,
      presetDialogOpen: false,
      presetName: '',
      customThemeEditorOpen: false,
      customThemeEditorClosing: false,
    };

    let suggestionTimer = null;
    let customThemeSaveTimer = null;
    let confirmResolver = null;

    const $home = document.getElementById('view-home');
    const $library = document.getElementById('view-library');
    const $settings = document.getElementById('view-settings');
    const $modal = document.getElementById('modal-overlay');
    const $confirm = document.getElementById('confirm-overlay');
    const $selection = document.getElementById('selection-overlay');
    const $preset = document.getElementById('preset-overlay');
    const $customTheme = document.getElementById('custom-theme-overlay');
    const $toast = document.getElementById('toast');
    const $updateNotice = document.getElementById('update-notice-root');

    const iconPaths = {
      ghost: '<path d="M9 10h.01"></path><path d="M15 10h.01"></path><path d="M12 2a8 8 0 0 0-8 8v10l2.4-1.8L8.8 20l2.4-1.8L13.6 20l2.4-1.8L18.4 20V10a8 8 0 0 0-8-8Z"></path>',
      gamepad: '<line x1="6" x2="10" y1="12" y2="12"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="15" x2="15.01" y1="13" y2="13"></line><line x1="18" x2="18.01" y1="11" y2="11"></line><rect width="20" height="12" x="2" y="6" rx="2"></rect>',
      trash: '<path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>',
      x: '<path d="M18 6 6 18"></path><path d="m6 6 12 12"></path>',
      search: '<circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>',
      eye: '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle>',
      sparkles: '<path d="m12 3-1.9 5.8L4 11l6.1 2.2L12 19l1.9-5.8L20 11l-6.1-2.2Z"></path>',
      rotate: '<path d="M21 12a9 9 0 1 1-3-6.7"></path><path d="M21 3v6h-6"></path>',
      library: '<path d="m16 6 4 14"></path><path d="M12 6v14"></path><path d="M8 8v12"></path><path d="M4 4v16"></path>',
      folder: '<path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"></path>',
      save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path>',
      settings: '<path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m4.9 4.9 1.4 1.4"></path><path d="m17.7 17.7 1.4 1.4"></path><path d="M12 2v2"></path><path d="M12 20v2"></path>',
      file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path><path d="M14 2v6h6"></path>',
      target: '<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>',
      monitor: '<rect width="20" height="14" x="2" y="3" rx="2"></rect><path d="M8 21h8"></path><path d="M12 17v4"></path>',
      palette: '<circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6 2 11.5S6.5 22 12 22h1.5a2.5 2.5 0 0 0 0-5H12a2 2 0 0 1 0-4h3.5A6.5 6.5 0 0 0 22 6.5C22 4 17.5 2 12 2Z"></path>'
    };

    function icon(name, className = 'lucide-icon') {
      return `<svg class="${className}" viewBox="0 0 24 24" aria-hidden="true">${iconPaths[name] || iconPaths.folder}</svg>`;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function formatSize(size) {
      const num = Number(size || 0);
      if (!num) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = num;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(1)} ${units[idx]}`;
    }

    function toast(message) {
      $toast.textContent = message;
      $toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => $toast.classList.remove('show'), 2200);
    }

    function restoreHomeInputFocus(caretPos = null) {
      const desired = typeof caretPos === 'number' ? caretPos : (typeof state.homeCursor === 'number' ? state.homeCursor : String(state.homeQuery || '').length);
      const input = document.getElementById('home-search-input');
      if (!input) return;
      const safePos = Math.max(0, Math.min(desired, input.value.length));
      if (document.activeElement !== input) {
        try { input.focus({ preventScroll: true }); } catch { input.focus(); }
      }
      try { input.setSelectionRange(safePos, safePos); } catch {}
    }

    async function waitForBackend() {
      if (window.pywebview && window.pywebview.api) return true;
      return new Promise(resolve => {
        let done = false;
        const finish = value => {
          if (done) return;
          done = true;
          resolve(value);
        };
        document.addEventListener('pywebviewready', () => finish(true), { once: true });
        const poll = setInterval(() => {
          if (window.pywebview && window.pywebview.api) {
            clearInterval(poll);
            finish(true);
          }
        }, 100);
        setTimeout(() => {
          clearInterval(poll);
          finish(!!(window.pywebview && window.pywebview.api));
        }, 3500);
      });
    }

    async function apiCall(method, ...args) {
      if (!(window.pywebview && window.pywebview.api && window.pywebview.api[method])) {
        throw new Error('Desktop backend not available');
      }
      return window.pywebview.api[method](...args);
    }

    function categoryIcon(category) {
      if (category.startsWith('Crack Leftovers')) return icon('search');
      if (category.startsWith('Steam ')) return icon('target');
      if (category === 'Save Files') return icon('save');
      if (category === 'Config Files') return icon('settings');
      if (category === 'Save & Config Files') return icon('save');
      if (category === 'NVIDIA') return icon('monitor');
      if (category === 'Documents' || category === 'Public Documents') return icon('file');
      if (category === 'Saved Games') return icon('save');
      if (category === 'Temp Files') return icon('trash');
      return icon('folder');
    }

    function groupedPaths(paths) {
      const groups = new Map();
      for (const path of paths || []) {
        const list = groups.get(path.category) || [];
        list.push(path);
        groups.set(path.category, list);
      }
      return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    }

    function formatInstalledSourceLabel(source) {
      const value = String(source || '');
      if (value === 'Epic') return 'Epic Games';
      return value;
    }

    function formatInstalledSources(sources) {
      return (sources || []).map(formatInstalledSourceLabel).filter(Boolean).join(', ');
    }

    function getFilteredLibraryItems() {
      const query = state.libraryQuery.trim().toLowerCase();
      return state.libraryItems.filter(item => {
        if (state.libraryFilter === 'visible' && item.archived) return false;
        if (state.libraryFilter === 'hidden' && !item.archived) return false;
        if (!query) return true;
        return item.name.toLowerCase().includes(query) || String(item.appid).includes(query);
      });
    }

    function countActive() {
      return state.libraryItems.filter(item => !item.archived).length;
    }

    function countArchived() {
      return state.libraryItems.filter(item => item.archived).length;
    }

    function selectedLibraryCount() {
      return state.selectedLibraryAppIds.length;
    }

    function isLibrarySelected(appid) {
      return state.selectedLibraryAppIds.includes(String(appid));
    }

    function syncSelectedLibraryIds() {
      const available = new Set(state.libraryItems.map(item => String(item.appid)));
      state.selectedLibraryAppIds = state.selectedLibraryAppIds.filter(appid => available.has(String(appid)));
    }

    function toggleLibrarySelection(appid) {
      const key = String(appid);
      if (isLibrarySelected(key)) {
        state.selectedLibraryAppIds = state.selectedLibraryAppIds.filter(value => value !== key);
        state.bulkExpandedAppIds = state.bulkExpandedAppIds.filter(value => value !== key);
      } else {
        state.selectedLibraryAppIds = [...state.selectedLibraryAppIds, key];
      }
    }

    function selectedLibraryItems() {
      const selected = new Set(state.selectedLibraryAppIds.map(String));
      return state.libraryItems.filter(item => selected.has(String(item.appid)));
    }

    function isBulkExpanded(appid) {
      return state.bulkExpandedAppIds.includes(String(appid));
    }

    function toggleBulkExpanded(appid) {
      const key = String(appid);
      if (isBulkExpanded(key)) {
        state.bulkExpandedAppIds = state.bulkExpandedAppIds.filter(value => value !== key);
      } else {
        state.bulkExpandedAppIds = [...state.bulkExpandedAppIds, key];
      }
    }

    function collectSelectedLibraryPaths() {
      const selected = new Set(state.selectedLibraryAppIds.map(String));
      return state.libraryItems
        .filter(item => selected.has(String(item.appid)))
        .flatMap(item => (item.paths || []).map(path => path.path));
    }

    function selectedHomePaths() {
      return [...document.querySelectorAll('.home-path-check:checked')].map(el => el.dataset.path).filter(Boolean);
    }

    function selectedModalPaths() {
      return [...document.querySelectorAll('.modal-path-check:checked')].map(el => el.dataset.path).filter(Boolean);
    }

    function copyText(text) {
      const area = document.createElement('textarea');
      area.value = text;
      area.style.position = 'fixed';
      area.style.opacity = '0';
      document.body.appendChild(area);
      area.focus();
      area.select();
      try {
        document.execCommand('copy');
        toast('Copied');
      } catch {
        toast('Copy failed');
      }
      document.body.removeChild(area);
    }

    async function openSteamDB(appid) {
      try {
        await apiCall('open_url', `https://steamdb.info/app/${appid}/`);
      } catch {
        toast('Could not open SteamDB');
      }
    }

    async function openPath(path) {
      try {
        const response = await apiCall('open_path', path);
        if (!response.ok) throw new Error(response.error || 'Could not open path');
      } catch (error) {
        toast(error.message || 'Could not open path');
      }
    }

    async function downloadInstallerUpdate() {
      if (!state.updateInfo || !state.updateInfo.installer_url) {
        toast('No installer update available');
        return;
      }
      const ok = await showConfirm({
        title: 'Download installer update',
        message: 'The installer update will be downloaded and then launched. The installer may close the app while updating. Continue?',
        confirmText: 'Download & Launch',
        cancelText: 'Cancel',
      });
      if (!ok) return;
      const download = await apiCall('download_update_installer', state.updateInfo.installer_url);
      if (!download.ok) {
        toast(download.error || 'Download failed');
        return;
      }
      const launch = await apiCall('launch_update_installer', download.path);
      if (!launch.ok) {
        toast(launch.error || 'Could not launch installer');
        return;
      }
      toast('Installer launched');
    }

    async function downloadPortableUpdate() {
      if (!state.updateInfo || !state.updateInfo.portable_url) {
        toast('No portable update available');
        return;
      }
      const download = await apiCall('download_portable_update', state.updateInfo.portable_url);
      if (!download.ok) {
        toast(download.error || 'Download failed');
        return;
      }
      toast('Portable package downloaded');
      if (download.folder) {
        await openPath(download.folder);
      }
    }

    function renderHomeSuggestionsOnly() {
      const wrap = document.querySelector('.search-wrap');
      if (!wrap) return;
      let box = document.getElementById('home-suggestions-box');
      if (!state.homeSuggestions.length) {
        if (box) box.remove();
        return;
      }
      if (!box) {
        box = document.createElement('div');
        box.id = 'home-suggestions-box';
        box.className = 'suggestions';
        wrap.appendChild(box);
      }
      box.innerHTML = state.homeSuggestions.map(item => `
        <button class="suggestion" type="button" tabindex="-1" data-action="pick-suggestion" data-appid="${escapeHtml(item.id)}" data-name="${escapeHtml(item.name)}">
          ${item.tiny_image ? `<img src="${escapeHtml(item.tiny_image)}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';" /><div class="fallback" style="display:none">${icon('ghost')}</div>` : `<div class="fallback">${icon('ghost')}</div>`}
          <div>
            <div class="suggestion-title">${escapeHtml(item.name)}</div>
            <div class="suggestion-sub">AppID: ${escapeHtml(item.id)}</div>
          </div>
        </button>
      `).join('');
    }

    async function updateSuggestions(query, caretPos = null) {
      const raw = query == null ? '' : String(query);
      const clean = raw.trim();
      const caret = typeof caretPos === 'number' ? caretPos : raw.length;
      state.homeCursor = caret;

      if (clean.length < 2) {
        state.homeSuggestions = [];
        renderHomeSuggestionsOnly();
        restoreHomeInputFocus(caret);
        return;
      }
      try {
        const suggestions = await apiCall('search_suggestions', clean);
        const currentInput = document.getElementById('home-search-input');
        const liveValue = currentInput && typeof currentInput.value === 'string' ? currentInput.value : state.homeQuery;
        if (liveValue !== raw) return;
        state.homeSuggestions = Array.isArray(suggestions) ? suggestions.slice(0, 6) : [];
        renderHomeSuggestionsOnly();
        restoreHomeInputFocus(caret);
      } catch {
        state.homeSuggestions = [];
        renderHomeSuggestionsOnly();
        restoreHomeInputFocus(caret);
      }
    }

    async function loadHistory() {
      try {
        const history = await apiCall('get_history');
        state.homeHistory = Array.isArray(history) ? history : [];
      } catch {
        state.homeHistory = [];
      }
    }

    function normalizeHexColor(value, fallback = '#d946ef') {
      let raw = String(value || '').trim();
      if (!raw) return fallback;
      if (!raw.startsWith('#')) raw = `#${raw}`;
      if (/^#[0-9a-fA-F]{3}$/.test(raw)) {
        raw = '#' + raw.slice(1).split('').map(char => char + char).join('');
      }
      return /^#[0-9a-fA-F]{6}$/.test(raw) ? raw.toLowerCase() : fallback;
    }

    function shiftHexColor(hex, amount = 34) {
      const value = normalizeHexColor(hex).slice(1);
      const channels = [0, 2, 4].map(index => parseInt(value.slice(index, index + 2), 16));
      const shifted = channels.map((channel, index) => {
        const delta = index === 0 ? amount : index === 1 ? -Math.round(amount / 3) : Math.round(amount / 2);
        return Math.max(0, Math.min(255, channel + delta));
      });
      return '#' + shifted.map(channel => channel.toString(16).padStart(2, '0')).join('');
    }

    function applyCustomThemeColor(color) {
      const accent = normalizeHexColor(color);
      document.body.style.setProperty('--custom-accent', accent);
      document.body.style.setProperty('--custom-accent-2', shiftHexColor(accent));
    }

    function normalizeHexColor(value, fallback = '#d946ef') {
      let raw = String(value || '').trim();
      if (!raw) return fallback;
      if (!raw.startsWith('#')) raw = `#${raw}`;
      if (/^#[0-9a-fA-F]{3}$/.test(raw)) {
        raw = '#' + raw.slice(1).split('').map(char => char + char).join('');
      }
      return /^#[0-9a-fA-F]{6}$/.test(raw) ? raw.toLowerCase() : fallback;
    }

    function shiftHexColor(hex, amount = 34) {
      const value = normalizeHexColor(hex).slice(1);
      const channels = [0, 2, 4].map(index => parseInt(value.slice(index, index + 2), 16));
      const shifted = channels.map((channel, index) => {
        const delta = index === 0 ? amount : index === 1 ? -Math.round(amount / 3) : Math.round(amount / 2);
        return Math.max(0, Math.min(255, channel + delta));
      });
      return '#' + shifted.map(channel => channel.toString(16).padStart(2, '0')).join('');
    }

    function applyCustomThemeColor(color, color2 = null, useSecond = null) {
      const accent = normalizeHexColor(color);
      const secondEnabled = useSecond === null
        ? !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color)
        : !!useSecond;
      const second = normalizeHexColor(color2 || (state.settingsInfo && state.settingsInfo.custom_theme_color_2) || shiftHexColor(accent));
      document.body.style.setProperty('--custom-accent', accent);
      document.body.style.setProperty('--custom-accent-2', second);
      document.body.style.setProperty('--custom-shade-accent', secondEnabled ? second : shiftHexColor(accent));
    }

    function applyTheme(themeName) {
      applyCustomThemeColor(
        state.settingsInfo && state.settingsInfo.custom_theme_color ? state.settingsInfo.custom_theme_color : '#d946ef',
        state.settingsInfo && state.settingsInfo.custom_theme_color_2 ? state.settingsInfo.custom_theme_color_2 : '#fb7185',
        state.settingsInfo && state.settingsInfo.custom_theme_use_second_color
      );
      document.body.dataset.theme = themeName || 'neon';
    }

    function applyFont(fontName) {
      document.body.dataset.font = fontName || 'inter';
    }

    async function setTheme(themeName) {
      const response = await apiCall('set_theme', themeName);
      if (response && response.ok) {
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.theme = response.theme;
        applyTheme(response.theme);
        renderSettings();
        renderTabs();
      }
    }

    async function setFont(fontName) {
      const response = await apiCall('set_font', fontName);
      if (response && response.ok) {
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.font = response.font;
        applyFont(response.font);
        renderSettings();
        renderTabs();
      }
    }

    async function setCustomThemeColor(color, options = {}) {
      const normalized = normalizeHexColor(color);
      const second = normalizeHexColor(options.color2 || (state.settingsInfo && state.settingsInfo.custom_theme_color_2) || '#fb7185');
      const useSecond = options.useSecond !== undefined ? !!options.useSecond : !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color);
      try {
        const response = await apiCall('set_custom_theme_color', normalized, second, useSecond);
        if (!response.ok) throw new Error(response.error || 'Invalid color');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = response.custom_theme_color;
        state.settingsInfo.custom_theme_color_2 = response.custom_theme_color_2 || second;
        state.settingsInfo.custom_theme_use_second_color = !!response.custom_theme_use_second_color;
        state.settingsInfo.theme = response.theme || 'custom';
        applyCustomThemeColor(response.custom_theme_color, state.settingsInfo.custom_theme_color_2, state.settingsInfo.custom_theme_use_second_color);
        applyTheme(response.theme || 'custom');
        if (options.render !== false) {
          renderSettings();
          renderTabs();
        }
        if (options.refreshEditor !== false && state.customThemeEditorOpen) {
          renderCustomThemeEditor();
        }
      } catch (error) {
        toast(error.message || 'Could not set custom color');
      }
    }

    function scheduleCustomThemeColorSave(color) {
      clearTimeout(customThemeSaveTimer);
      customThemeSaveTimer = setTimeout(() => {
        setCustomThemeColor(color, {
          color2: state.settingsInfo && state.settingsInfo.custom_theme_color_2,
          useSecond: state.settingsInfo && state.settingsInfo.custom_theme_use_second_color,
          render: false,
          refreshEditor: false,
        });
      }, 260);
    }

    async function saveCustomThemePreset(name, color) {
      try {
        const response = await apiCall(
          'save_custom_theme_preset',
          name,
          color,
          state.settingsInfo && state.settingsInfo.custom_theme_color_2 ? state.settingsInfo.custom_theme_color_2 : '#fb7185',
          !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color)
        );
        if (!response.ok) throw new Error(response.error || 'Could not save preset');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = response.custom_theme_color;
        state.settingsInfo.custom_theme_color_2 = response.custom_theme_color_2 || state.settingsInfo.custom_theme_color_2 || '#fb7185';
        state.settingsInfo.custom_theme_use_second_color = !!response.custom_theme_use_second_color;
        state.settingsInfo.custom_theme_presets = response.custom_theme_presets || [];
        state.settingsInfo.theme = response.theme || 'custom';
        state.presetDialogOpen = false;
        state.presetName = '';
        applyCustomThemeColor(response.custom_theme_color, state.settingsInfo.custom_theme_color_2, state.settingsInfo.custom_theme_use_second_color);
        applyTheme(response.theme || 'custom');
        renderAll();
        toast('Theme preset saved');
      } catch (error) {
        toast(error.message || 'Could not save preset');
      }
    }

    async function deleteCustomThemePreset(name) {
      try {
        const response = await apiCall('delete_custom_theme_preset', name);
        if (!response.ok) throw new Error(response.error || 'Could not delete preset');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_presets = response.custom_theme_presets || [];
        renderSettings();
        renderTabs();
        if (state.customThemeEditorOpen) renderCustomThemeEditor();
        toast('Theme preset deleted');
      } catch (error) {
        toast(error.message || 'Could not delete preset');
      }
    }

    async function loadSettingsInfo() {
      try {
        state.settingsInfo = await apiCall('get_settings_info');
      } catch {
        state.settingsInfo = null;
      }
      applyVersionLabels();
      applyTheme(state.settingsInfo && state.settingsInfo.theme ? state.settingsInfo.theme : 'neon');
      applyFont(state.settingsInfo && state.settingsInfo.font ? state.settingsInfo.font : 'inter');
    }

    function applyVersionLabels() {
      const version = state.settingsInfo && state.settingsInfo.current_version ? state.settingsInfo.current_version : '3.1';
      const top = document.getElementById('app-version-label');
      const footer = document.getElementById('app-footer-version');
      if (top) top.textContent = `v${version}`;
      if (footer) footer.textContent = `Ghost Hunter Pro v${version}`;
    }

    async function refreshUpdateInfo(options = {}) {
      try {
        state.updateInfo = await apiCall('check_for_updates');
      } catch (error) {
        state.updateInfo = { ok: false, configured: false, error: error.message || 'Update check failed.' };
      }
      if (state.updateInfo && state.updateInfo.ok && state.updateInfo.update_available && !state.updateNoticeDismissed) {
        state.updateNotice = state.updateInfo;
      } else if (!options.preserveNotice) {
        state.updateNotice = null;
      }
      renderSettings();
      renderTabs();
      renderUpdateNotice();
    }

    async function checkStartupUpdateNotice() {
      try {
        const update = await apiCall('check_for_updates');
        if (update && update.ok) {
          state.updateInfo = update;
          if (update.update_available && !state.updateNoticeDismissed) {
            state.updateNotice = update;
          }
        }
      } catch {}
      renderSettings();
      renderTabs();
      renderUpdateNotice();
    }

    function settleConfirm(value) {
      const resolver = confirmResolver;
      confirmResolver = null;
      state.confirmDialog = null;
      renderConfirm();
      if (resolver) resolver(value);
    }

    function showConfirm({ title, message, confirmText = 'Delete', cancelText = 'Cancel' }) {
      state.confirmDialog = { title, message, confirmText, cancelText };
      renderConfirm();
      return new Promise(resolve => {
        confirmResolver = resolve;
      });
    }

      state.libraryShowScrollTop = show;
      if (button) {

        state.modalClosing = false;
        renderModal();

                  ${theme.id === 'custom' ? `<button class="settings-tab custom-edit-btn" type="button" data-action="open-custom-theme-editor">${icon('palette')} Edit Custom Theme</button>` : ''}

          </div>
          <div class="settings-section">
            <div class="settings-section-title">Fonts</div>
            <div class="font-grid">
              ${(info.font_options || []).map(font => `
                <button class="font-card ${info.font === font.id ? 'active' : ''}" data-action="set-font" data-font-id="${escapeHtml(font.id)}">
                  <div class="font-preview ${escapeHtml(font.id)}">Ghost Hunter Pro</div>

              <div class="settings-label">Creator</div>
              <div class="settings-value">${escapeHtml(creator)}</div>
            </div>
            <div class="settings-item">
              <div class="settings-label">Release Source</div>
              <div class="settings-value">${configured ? 'GitHub Releases configured' : 'Not configured'}</div>

    function renderAll() {
      renderHome();
      renderLibrary();
      renderSettings();
      renderTabs();
      renderModal();
      renderSelectionReview();
      renderConfirm();
      renderPresetDialog();
      renderCustomThemeEditor();
      renderUpdateNotice();
    }

    async function refreshLibrary(options = {}) {
      const keepModal = options.keepModal !== false;
      const forceRescan = options.forceRescan === true;
      const background = options.background === true;
      if (background) {
        state.libraryPreloading = true;
      } else {
        state.libraryLoading = true;
        renderAll();
      }
      try {
        const response = await apiCall(forceRescan ? 'rescan_library' : 'scan_library');
        if (!response.ok) throw new Error(response.error || 'Failed to scan library');
        state.libraryItems = response.items || [];
        state.libraryLoaded = true;
      } catch (error) {
        toast(error.message || 'Library scan failed');
      } finally {
        state.libraryLoading = false;
        state.libraryPreloading = false;
        syncSelectedLibraryIds();
        if (keepModal && state.modalGameId && !state.libraryItems.some(item => String(item.appid) === String(state.modalGameId))) {
          state.modalGameId = null;
        }
        renderAll();
        updateLibraryScrollButton();
      }
    }

    async function runHomeSearch() {
      const input = document.getElementById('home-search-input');
      const rawQuery = input && typeof input.value === 'string' ? input.value : '';
      const query = rawQuery.trim();
      if (!query) return;
      state.homeQuery = rawQuery;
      state.homeLoading = true;
      state.homeResult = null;
      state.homeSuggestions = [];
      renderAll();
      try {
        const response = await apiCall('home_search', query);
        if (!response.ok) throw new Error(response.error || 'Search failed');
        state.homeResult = response;
        await loadHistory();
      } catch (error) {
        toast(error.message || 'Search failed');
      } finally {
        state.homeLoading = false;
        renderAll();
      }
    }

    async function deletePaths(paths, flags = {}) {
      if (!paths.length) {
        toast('Nothing selected');
        return;
      }
      const ok = await showConfirm({
        title: 'Confirm deletion',
        message: `Delete ${paths.length} selected path(s)?\n\nThis action cannot be undone.`,
        confirmText: 'Delete',
        cancelText: 'Cancel',
      });
      if (!ok) return;
      try {
        const response = await apiCall('delete_paths', paths);
        const failedCount = (response.failed || []).length;
        toast(failedCount ? `Deleted ${response.deleted} path(s), ${failedCount} failed` : `Deleted ${response.deleted} path(s)`);
        if (flags.refreshHome && state.homeQuery) {
          await runHomeSearch();
        }
        if (flags.refreshLibrary) {
          await refreshLibrary();
        }
      } catch (error) {
        toast(error.message || 'Delete failed');
      }
    }

    async function toggleArchive(appid, currentlyArchived) {
      try {
        await apiCall('set_archived', String(appid), !currentlyArchived);
        const item = state.libraryItems.find(game => String(game.appid) === String(appid));
        if (item) item.archived = !currentlyArchived;
        renderLibrary();
        renderTabs();
        if (state.modalGameId && String(state.modalGameId) === String(appid)) {
          renderModal();
        }
      } catch {
        toast('Hide/show action failed');
      }
    }

    document.addEventListener('submit', async event => {
      if (event.target && event.target.id === 'home-search-form') {
        event.preventDefault();
        await runHomeSearch();
      }
    });

    document.addEventListener('mousedown', event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.closest('.suggestion')) {
        event.preventDefault();
      }
    });

    document.addEventListener('input', event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === 'library-filter-input') {
        const currentValue = target.value;
        const caret = typeof target.selectionStart === 'number' ? target.selectionStart : currentValue.length;
        state.libraryQuery = currentValue;
        renderLibrary();
        renderTabs();
        const restored = document.getElementById('library-filter-input');
        if (restored) {
          restored.focus();
          try { restored.setSelectionRange(caret, caret); } catch {}
        }
      }
      if (target.id === 'home-search-input') {
        const currentValue = target.value;
        const caret = typeof target.selectionStart === 'number' ? target.selectionStart : currentValue.length;
        state.homeQuery = currentValue;
        state.homeCursor = caret;
        clearTimeout(suggestionTimer);
        suggestionTimer = setTimeout(() => updateSuggestions(currentValue, caret), 220);
      }
      if (target.dataset.action === 'custom-theme-color-input') {
        const color = normalizeHexColor(target.value);
        const hex = document.querySelector('[data-action="custom-theme-hex-input"]');
        if (hex) hex.value = color;
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = color;
        state.settingsInfo.theme = 'custom';
        applyCustomThemeColor(color, state.settingsInfo.custom_theme_color_2 || '#fb7185', state.settingsInfo.custom_theme_use_second_color);
        applyTheme('custom');
        scheduleCustomThemeColorSave(color);
      }
      if (target.dataset.action === 'custom-theme-hex-input') {
        const raw = String(target.value || '').trim();
        applyCustomThemeColor(raw);
        if (/^#?[0-9a-fA-F]{3}$/.test(raw) || /^#?[0-9a-fA-F]{6}$/.test(raw)) {
          const color = normalizeHexColor(raw);
          const picker = document.querySelector('[data-action="custom-theme-color-input"]');
          if (picker) picker.value = color;
          if (!state.settingsInfo) state.settingsInfo = {};
          state.settingsInfo.custom_theme_color = color;
          state.settingsInfo.theme = 'custom';
          applyCustomThemeColor(color, state.settingsInfo.custom_theme_color_2 || '#fb7185', state.settingsInfo.custom_theme_use_second_color);
          applyTheme('custom');
          scheduleCustomThemeColorSave(color);
        }
      }
      if (target.dataset.action === 'custom-theme-color2-input') {
        const color = normalizeHexColor(target.value);
        const hex = document.querySelector('[data-action="custom-theme-hex2-input"]');
        if (hex) hex.value = color;
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color_2 = color;
        state.settingsInfo.custom_theme_use_second_color = true;
        state.settingsInfo.theme = 'custom';
        applyTheme('custom');
        scheduleCustomThemeColorSave(state.settingsInfo.custom_theme_color || '#d946ef');
      }
      if (target.dataset.action === 'custom-theme-hex2-input') {
        const raw = String(target.value || '').trim();
        if (/^#?[0-9a-fA-F]{3}$/.test(raw) || /^#?[0-9a-fA-F]{6}$/.test(raw)) {
          const color = normalizeHexColor(raw);
          const picker = document.querySelector('[data-action="custom-theme-color2-input"]');
          if (picker) picker.value = color;
          if (!state.settingsInfo) state.settingsInfo = {};
          state.settingsInfo.custom_theme_color_2 = color;
          state.settingsInfo.custom_theme_use_second_color = true;
          state.settingsInfo.theme = 'custom';
          applyTheme('custom');
          scheduleCustomThemeColorSave(state.settingsInfo.custom_theme_color || '#d946ef');
        }
      }
    });

    document.addEventListener('click', async event => {
      const clickedInsideSearch = event.target.closest('.search-wrap');
      if (!clickedInsideSearch && state.homeSuggestions.length) {
        state.homeSuggestions = [];
        renderHomeSuggestionsOnly();
      }
      const actionEl = event.target.closest('[data-action]');
      if (!actionEl) {
        if (event.target === $modal) {
          closeModalAnimated();
        }
        if (event.target === $confirm) {
          settleConfirm(false);
        }
        if (event.target === $selection) {
          state.bulkReviewOpen = false;
          renderSelectionReview();
        }
        if (event.target === $preset) {
          state.presetDialogOpen = false;
          renderPresetDialog();
        }
        if (event.target === $customTheme) {
          closeCustomThemeEditorAnimated();
        }
        return;
      }
      const action = actionEl.dataset.action;
      switch (action) {
        case 'confirm-ok':
          settleConfirm(true);
          break;
        case 'confirm-cancel':
          settleConfirm(false);
          break;
        case 'switch-tab':
          state.activeTab = actionEl.dataset.tab || 'home';
          renderTabs();
          updateLibraryScrollButton();
          if (state.activeTab === 'settings') {
            await refreshUpdateInfo();
          } else if (state.activeTab === 'home') {
            restoreHomeInputFocus();
          } else if (state.activeTab === 'library' && !state.libraryLoaded && !state.libraryLoading) {
            await refreshLibrary();
          }
          break;
        case 'library-scan':
          await refreshLibrary({ forceRescan: true });
          break;
        case 'library-rescan':
          await refreshLibrary({ forceRescan: true });
          break;
        case 'library-filter':
          state.libraryFilter = actionEl.dataset.filter || 'visible';
          renderLibrary();
          renderTabs();
          break;
        case 'library-clear-search':
          state.libraryQuery = '';
          renderLibrary();
          renderTabs();
          break;
        case 'toggle-select-game':
          toggleLibrarySelection(actionEl.dataset.appid || '');
          renderLibrary();
          renderTabs();
          updateLibraryScrollButton();
          break;
        case 'library-delete-selected':
          state.bulkReviewOpen = true;
          renderSelectionReview();
          break;
        case 'library-scroll-top': {
          const libraryView = document.getElementById('view-library');
          if (libraryView) libraryView.scrollTo({ top: 0, behavior: 'smooth' });
          break;
        }
        case 'close-selection-review':
          state.bulkReviewOpen = false;
          renderSelectionReview();
          break;
        case 'selection-clear-all':
          state.selectedLibraryAppIds = [];
          state.bulkExpandedAppIds = [];
          state.bulkReviewOpen = false;
          renderLibrary();
          renderSelectionReview();
          renderTabs();
          break;
        case 'selection-remove-game':
          toggleLibrarySelection(actionEl.dataset.appid || '');
          renderLibrary();
          renderSelectionReview();
          renderTabs();
          break;
        case 'toggle-selection-expand': {
          const appid = actionEl.dataset.appid || '';
          toggleBulkExpanded(appid);
          const container = actionEl.closest('.selection-game');
          if (container) {
            container.classList.toggle('expanded', isBulkExpanded(appid));
          }
          break;
        }
        case 'selection-delete-game': {
          const game = state.libraryItems.find(item => String(item.appid) === String(actionEl.dataset.appid));
          if (game) {
            await deletePaths((game.paths || []).map(path => path.path), { refreshLibrary: true });
            toggleLibrarySelection(actionEl.dataset.appid || '');
            renderLibrary();
            renderSelectionReview();
            renderTabs();
          }
          break;
        }
        case 'selection-delete-all': {
          const selectedPaths = collectSelectedLibraryPaths();
          state.selectedLibraryAppIds = [];
          state.bulkExpandedAppIds = [];
          state.bulkReviewOpen = false;
          await deletePaths(selectedPaths, { refreshLibrary: true });
          renderLibrary();
          renderSelectionReview();
          renderTabs();
          break;
        }
        case 'open-game':
          state.modalClosing = false;
          state.modalGameId = actionEl.dataset.appid || null;
          renderModal();
          break;
        case 'close-modal':
          closeModalAnimated();
          break;
        case 'open-steamdb':
          await openSteamDB(actionEl.dataset.appid);
          break;
        case 'history-search':
          state.homeQuery = actionEl.dataset.name || actionEl.dataset.appid || '';
          state.homeSuggestions = [];
          renderHome();
          await runHomeSearch();
          break;
        case 'history-remove':
          await apiCall('remove_history_item', actionEl.dataset.appid || '');
          await loadHistory();
          renderHome();
          break;
        case 'clear-history':
          await apiCall('clear_history');
          await loadHistory();
          renderHome();
          break;
        case 'settings-tab':
          state.settingsTab = actionEl.dataset.settingsTab || 'updates';
          renderSettings();
          renderTabs();
          break;
        case 'set-theme':
          await setTheme(actionEl.dataset.themeId || 'neon');
          break;
        case 'apply-custom-theme': {
          const color = state.settingsInfo && state.settingsInfo.custom_theme_color ? state.settingsInfo.custom_theme_color : '#d946ef';
          await setCustomThemeColor(color, {
            color2: state.settingsInfo && state.settingsInfo.custom_theme_color_2 ? state.settingsInfo.custom_theme_color_2 : '#fb7185',
            useSecond: !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color),
            refreshEditor: false,
          });
          toast('Custom theme applied');
          break;
        }
        case 'toggle-custom-second-color': {
          if (!state.settingsInfo) state.settingsInfo = {};
          state.settingsInfo.custom_theme_use_second_color = !state.settingsInfo.custom_theme_use_second_color;
          state.settingsInfo.theme = 'custom';
          applyTheme('custom');
          await setCustomThemeColor(state.settingsInfo.custom_theme_color || '#d946ef', {
            color2: state.settingsInfo.custom_theme_color_2 || '#fb7185',
            useSecond: state.settingsInfo.custom_theme_use_second_color,
            render: false,
            refreshEditor: false,
          });
          const btn = actionEl;
          btn.classList.toggle('active', !!state.settingsInfo.custom_theme_use_second_color);
          btn.textContent = state.settingsInfo.custom_theme_use_second_color ? 'Second Color: On' : 'Second Color: Off';
          document.querySelectorAll('[data-action="custom-theme-color2-input"], [data-action="custom-theme-hex2-input"]').forEach(input => {
            input.disabled = !state.settingsInfo.custom_theme_use_second_color;
          });
          break;
        }
        case 'open-preset-dialog':
          state.presetName = '';
          state.presetDialogOpen = true;
          renderPresetDialog();
          break;
        case 'preset-cancel':
          state.presetDialogOpen = false;
          state.presetName = '';
          renderPresetDialog();
          break;
        case 'preset-save-confirm': {
          const nameInput = document.getElementById('preset-name-input');
          const color = state.settingsInfo && state.settingsInfo.custom_theme_color ? state.settingsInfo.custom_theme_color : '#d946ef';
          await saveCustomThemePreset(nameInput && nameInput.value ? nameInput.value : 'Custom Theme', color);
          break;
        }
        case 'load-theme-preset':
          await setCustomThemeColor(actionEl.dataset.color || '#d946ef', {
            color2: actionEl.dataset.color2 || '#fb7185',
            useSecond: actionEl.dataset.useSecond === '1',
          });
          break;
        case 'delete-theme-preset':
          await deleteCustomThemePreset(actionEl.dataset.presetName || '');
          break;
        case 'open-custom-theme-editor':
          state.customThemeEditorOpen = true;
          renderCustomThemeEditor();
          break;
        case 'close-custom-theme-editor':
          closeCustomThemeEditorAnimated();
          break;
        case 'set-font':
          await setFont(actionEl.dataset.fontId || 'inter');
          break;
        case 'settings-check-updates':
          state.settingsTab = 'updates';
          await refreshUpdateInfo({ preserveNotice: true });
          break;
        case 'dismiss-update-notice':
          state.updateNoticeDismissed = true;
          state.updateNotice = null;
          renderUpdateNotice();
          break;
        case 'open-update-settings':
          state.updateNoticeDismissed = true;
          state.updateNotice = null;
          state.activeTab = 'settings';
          state.settingsTab = 'updates';
          renderAll();
          updateLibraryScrollButton();
          break;
        case 'settings-open-releases':
          if (state.settingsInfo && state.settingsInfo.repo_url) {
            const result = await apiCall('open_releases_page');
            if (!result.ok) toast(result.error || 'Could not open releases page');
          }
          break;
        case 'settings-download-installer':
          await downloadInstallerUpdate();
          break;
        case 'settings-download-portable':
          await downloadPortableUpdate();
          break;
        case 'toggle-archive':
          await toggleArchive(actionEl.dataset.appid, actionEl.dataset.archived === '1');
          break;
        case 'open-path':
          await openPath(actionEl.dataset.path || '');
          break;
        case 'copy-path':
          copyText(actionEl.dataset.path || '');
          break;
        case 'pick-suggestion':
          state.homeQuery = actionEl.dataset.name || actionEl.dataset.appid || '';
          state.homeSuggestions = [];
          renderHome();
          await runHomeSearch();
          break;
        case 'delete-path':
          await deletePaths([actionEl.dataset.path].filter(Boolean), {
            refreshHome: !!document.querySelector('.home-results.visible'),
            refreshLibrary: !!state.libraryLoaded,
          });
          break;
        case 'home-clear':
          clearHomeView();
          break;
        case 'home-copy-selected': {
          const paths = selectedHomePaths();
          if (!paths.length) toast('Nothing selected');
          else copyText(paths.join('\n'));
          break;
        }
        case 'home-delete-selected':
          await deletePaths(selectedHomePaths(), { refreshHome: true });
          break;
        case 'home-delete-all':
          await deletePaths((state.homeResult?.paths || []).map(item => item.path), { refreshHome: true });
          break;
        case 'modal-delete-selected':
          await deletePaths(selectedModalPaths(), { refreshLibrary: true });
          break;
        case 'modal-delete-all': {
          const item = state.libraryItems.find(game => String(game.appid) === String(actionEl.dataset.appid));
          await deletePaths((item?.paths || []).map(path => path.path), { refreshLibrary: true });
          break;
        }
      }
    });

    async function bootstrap() {
      renderAll();
      state.backendReady = await waitForBackend();
      if (!state.backendReady) {
        toast('Desktop backend not available');
        return;
      }
      try {
        await apiCall('ping');
      } catch {
        toast('Desktop backend not available');
        return;
      }
      const libraryView = document.getElementById('view-library');
      if (libraryView) {
        libraryView.addEventListener('scroll', updateLibraryScrollButton);
      }
      await loadHistory();
      await loadSettingsInfo();
      renderAll();
      updateLibraryScrollButton();
      refreshLibrary({ background: true, keepModal: false });
      checkStartupUpdateNotice();
    }

    bootstrap();
  </script>
</body>
</html>
